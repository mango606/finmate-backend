plugins {
    id 'java'
    id 'war'
    id 'org.gretty' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.3'
}

group = 'com.example'
version = '1.0.0'
sourceCompatibility = '17'
targetCompatibility = '17'

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework:spring-framework-bom:5.3.37'
        mavenBom 'org.springframework.security:spring-security-bom:5.8.13'
    }
}

dependencies {
    // Spring Framework Core
    implementation 'org.springframework:spring-context'
    implementation 'org.springframework:spring-webmvc'
    implementation 'org.springframework:spring-tx'
    implementation 'org.springframework:spring-jdbc'
    implementation 'org.springframework:spring-test'
    implementation 'org.springframework:spring-aop'
    implementation 'org.springframework:spring-aspects'

    // Spring Security
    implementation 'org.springframework.security:spring-security-web'
    implementation 'org.springframework.security:spring-security-config'
    implementation 'org.springframework.security:spring-security-core'

    // Database
    implementation 'mysql:mysql-connector-java:8.0.33'
    implementation 'com.zaxxer:HikariCP:5.0.1'

    // MyBatis
    implementation 'org.mybatis:mybatis:3.5.13'
    implementation 'org.mybatis:mybatis-spring:3.0.2'

    // Jackson for JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.15.2'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.3'
    implementation 'io.jsonwebtoken:jjwt-impl:0.12.3'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.12.3'

    // Validation
    implementation 'javax.validation:validation-api:2.0.1.Final'
    implementation 'org.hibernate.validator:hibernate-validator:6.2.5.Final'

    // Servlet API
    providedCompile 'javax.servlet:javax.servlet-api:4.0.1'
    providedCompile 'javax.servlet.jsp:javax.servlet.jsp-api:2.3.3'
    providedCompile 'javax.servlet:jstl:1.2'

    // Annotation Processing
    implementation 'javax.annotation:javax.annotation-api:1.3.2'

    // Logging
    implementation 'ch.qos.logback:logback-classic:1.4.11'
    implementation 'org.slf4j:slf4j-api:2.0.9'

    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    // Swagger 2.9.2
    implementation 'io.springfox:springfox-swagger2:2.9.2'
    implementation 'io.springfox:springfox-swagger-ui:2.9.2'

    // File Upload
    implementation 'commons-fileupload:commons-fileupload:1.5'
    implementation 'commons-io:commons-io:2.11.0'

    // Test Dependencies
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testImplementation 'org.mockito:mockito-core:5.5.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.5.0'
    testImplementation 'org.springframework:spring-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.assertj:assertj-core:3.24.2'
    testImplementation 'com.h2database:h2:2.2.224'
}

// Gretty 설정 (Embedded Tomcat 9)
gretty {
    httpPort = 8080
    contextPath = '/'
    servletContainer = 'tomcat9'

    // 개발 설정
    debugSuspend = false
    managedClassReload = true
    recompileOnSourceChange = true
    reloadOnClassChange = true
    reloadOnConfigChange = true
    reloadOnLibChange = true

    // JVM 옵션
    jvmArgs = [
            '-Xms512m',
            '-Xmx1024m',
            '-Dfile.encoding=UTF-8',
            '-Duser.timezone=Asia/Seoul',
            '-Djava.awt.headless=true'
    ]

    // 시스템 프로퍼티
    systemProperties = [
            'file.encoding': 'UTF-8',
            'user.timezone': 'Asia/Seoul',
            'console.encoding': 'UTF-8'
    ]
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }

    // 테스트 JVM 옵션
    jvmArgs = [
            '-Dfile.encoding=UTF-8',
            '-Duser.timezone=Asia/Seoul'
    ]
}

// WAR 빌드 설정
war {
    archiveBaseName = 'finmate'
    archiveVersion = '1.0.0'

    // 웹 리소스 설정
    from('src/main/webapp') {
        into '/'
    }
}

// 컴파일 설정
compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += [
            '-parameters',
            '--enable-preview'
    ]
    options.release = 17
}

compileTestJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-parameters']
    options.release = 17
}

// 리소스 처리 인코딩
processResources {
    filteringCharset = 'UTF-8'
}

processTestResources {
    filteringCharset = 'UTF-8'
}

// Gradle Wrapper 설정
wrapper {
    gradleVersion = '8.4'
    distributionType = Wrapper.DistributionType.ALL
}